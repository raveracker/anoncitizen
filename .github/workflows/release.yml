name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to npm
    uses: ./.github/workflows/publish.yml
    needs: [ci]
    secrets: inherit

  deploy-testnet:
    name: Deploy Testnet
    uses: ./.github/workflows/deploy-testnet.yml
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha')
    secrets: inherit

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
