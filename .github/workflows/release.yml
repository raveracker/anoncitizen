name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Step 1: Lint, typecheck, test all packages
  ci:
    name: "Step 1: CI"
    uses: ./.github/workflows/ci.yml

  # Step 2: Deploy contracts to Polygon Amoy
  deploy-testnet:
    name: "Step 2: Deploy Testnet"
    needs: [ci]
    if: "!contains(github.ref, 'alpha')"
    uses: ./.github/workflows/deploy-testnet.yml
    secrets: inherit

  # Step 3: Publish all packages to npm
  publish:
    name: "Step 3: Publish to npm"
    needs: [ci, deploy-testnet]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      (needs.deploy-testnet.result == 'success' || needs.deploy-testnet.result == 'skipped')
    uses: ./.github/workflows/publish.yml
    secrets: inherit

  # Step 4: Create GitHub Release
  github-release:
    name: "Step 4: GitHub Release"
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
